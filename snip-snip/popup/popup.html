<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#fbf5e6;--ink:#232028;--pink:#ff3d7f;--blue:#2f6bff;--lime:#54c246;--muted:#6b6472;
    --wonky:255px 14px 235px 16px/16px 235px 14px 255px}
  *{box-sizing:border-box}
  body{width:270px;margin:0;padding:14px;background:var(--paper);color:var(--ink);font-family:"Noto Sans",system-ui,sans-serif}
  .head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .head img{width:30px;height:30px}
  .head b{font-family:"Caveat",cursive;font-weight:700;font-size:23px;line-height:1}
  .head small{display:block;font-family:"Caveat",cursive;font-size:14px;color:var(--pink)}
  .row{display:flex;gap:8px;margin-bottom:8px}
  .big{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;cursor:pointer;
    color:var(--ink);background:#fff;border:2.5px solid var(--ink);border-radius:16px 12px 15px 13px;
    box-shadow:2px 3px 0 rgba(43,40,50,.2);font-family:"Caveat",cursive;font-size:17px;font-weight:700;transition:transform .1s}
  .big:hover{transform:translate(-1px,-1px)}
  .big:active{transform:translate(1px,1px)}
  .big svg{width:20px;height:20px}
  .big.pk{border-color:var(--pink)}.big.pk svg{color:var(--pink)}
  .big.bl{border-color:var(--blue)}.big.bl svg{color:var(--blue)}
  .link{width:100%;padding:9px;cursor:pointer;background:transparent;border:2.5px solid var(--ink);
    border-radius:14px 11px 13px 12px;color:var(--muted);font-family:"Caveat",cursive;font-size:16px;box-shadow:2px 2px 0 rgba(43,40,50,.15)}
  .link:hover{color:var(--ink)}
  .recent{margin-top:12px}
  .recent h4{margin:0 0 7px;font-family:"Caveat",cursive;font-size:15px;color:var(--muted)}
  .strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
  .strip img{height:44px;border-radius:6px;border:2px solid var(--ink);cursor:pointer;flex:none;background:#fff}
  .strip img:hover{border-color:var(--pink)}
  .empty{font-family:"Caveat",cursive;font-size:15px;color:#a49bab;padding:4px 0}
  .foot{margin-top:12px;font-family:"Caveat",cursive;font-size:14px;color:#a49bab;text-align:center}
  .kbd{font-family:ui-monospace,monospace;border:2px solid var(--ink);border-radius:5px;padding:0 5px;color:var(--muted);font-size:11px}
  .warn{display:none;margin-top:10px;font-family:"Caveat",cursive;font-size:15px;color:var(--pink);line-height:1.4}
</style>
</head>
<body>
  <div class="head"><img src="../icons/icon48.png"><div><small>snip &amp; collage</small><b>Snip Snip</b></div></div>
  <div class="row">
    <button class="big pk" data-mode="rect"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="4" y="6" width="16" height="12" rx="2"/></svg>Box cut</button>
    <button class="big bl" data-mode="free"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12c0-4 3-7 7-7s7 3 7 7-3 6-7 6c-2 0-3 1-3 2"/></svg>Free cut</button>
  </div>
  <button class="link" id="openBoard">🖼 open my board</button>
  <div class="recent"><h4>recent snips</h4><div class="strip" id="strip"><span class="empty">nothing snipped yet</span></div></div>
  <p class="warn" id="warn">Can't snip this page (chrome:// pages, the web store, and the new-tab page are protected). Try a normal website.</p>
  <div class="foot">shortcut <span class="kbd">Alt+Shift+S</span></div>
  <script src="popup.js"></script>
</body>
</html>
